<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
	<defs>
		<linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#fdf49a" />
			<stop offset="30%" stop-color="#ffd700" />
			<stop offset="70%" stop-color="#eac01e" />
			<stop offset="100%" stop-color="#bf9a13" />
		</linearGradient>
		<filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
			<feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
			<feOffset in="blur" dx="2" dy="2" result="offsetBlur" />
			<feMerge>
				<feMergeNode in="offsetBlur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
		<path id="circlePath" d="M300,300 m0,-150 a150,150 0 1,1 0,300 a150,150 0 1,1 0,-300 Z" transform="rotate(90 300 300)" />
	</defs>

	<rect width="100%" height="100%" fill="black" />

	<path d="M300,50 a250,250 0 1,1 0,500 a250,250 0 1,1 0,-500 M300,50 L300,45 A255,255 0 0,0 255,103 L260,108 A250,250 0 0,1 300,50 Z" fill="#a10a17" filter="url(#shadow)" />
	<path d="M255,103 A255,255 0 0,0 103,255 L108,260 A250,250 0 0,1 260,108 Z" fill="#a10a17" filter="url(#shadow)" />
	<path d="M103,255 A255,255 0 0,0 300,555 L300,550 A250,250 0 0,1 108,260 Z" fill="#a10a17" filter="url(#shadow)" />
	<path d="M300,555 A255,255 0 0,0 497,345 L492,340 A250,250 0 0,1 300,550 Z" fill="#a10a17" filter="url(#shadow)" />
	<path d="M497,345 A255,255 0 0,0 300,50 L300,55 A250,250 0 0,1 492,340 Z" fill="#a10a17" filter="url(#shadow)" />

	<circle cx="300" cy="300" r="235" fill="none" stroke="url(#goldGradient)" stroke-width="30" filter="url(#shadow)"/>
	<circle cx="300" cy="300" r="220" fill="none" stroke="#bf9a13" stroke-width="1.5" opacity="0.4"/>

	<circle cx="300" cy="300" r="205" fill="#a10a17" />

	<text font-family="Georgia, serif" font-size="60" font-weight="bold" fill="url(#goldGradient)" filter="url(#shadow)">
		<textPath xlink:href="#circlePath" text-anchor="middle" startOffset="25%">ÖZBIGA</textPath>
	</text>

	<path d="M210,340 Q300,430 390,340 M210,340 Q300,390 390,340" fill="none" stroke="url(#goldGradient)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>

	<text x="300" y="445" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" filter="url(#shadow)">ET</text>
</svg>